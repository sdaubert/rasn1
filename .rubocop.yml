require:
  - rubocop-performance
AllCops:
  TargetRubyVersion: '2.4'
  NewCops: enable
Layout/LineLength:
  Enabled: false
Layout/SpaceAroundEqualsInParameterDefault:
  EnforcedStyle: no_space
Lint/EmptyWhen:
  Enabled: false
Lint/Void:
  Enabled: false
Metrics/AbcSize:
  Max: 20
Metrics/ClassLength:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/MethodLength:
  Max: 20
Naming/AccessorMethodName:
  Enabled: false
Style/AsciiComments:
  Enabled: false
Style/DoubleNegation:
  Enabled: false
Style/Encoding:
  Enabled: false
Style/EvalWithLocation:
  Enabled: false
Style/FormatString:
  EnforcedStyle: percent
Style/FormatStringToken:
  EnforcedStyle: unannotated
Style/PerlBackrefs:
  Enabled: false
Style/RedundantSelf:
  Enabled: false
Style/RegexpLiteral:
  EnforcedStyle: slashes
Style/StructInheritance:
  Enabled: false
Style/TrailingCommaInArrayLiteral:
  Enabled: false
Style/TrailingCommaInHashLiteral:
  Enabled: false
